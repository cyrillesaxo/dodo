name: Fetch STB-0 artifacts
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-stb0.yml'
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch executed STB-0 results and diagnostics
        run: |
          set -euo pipefail
          base='https://deploy-preview-18--frabjous-fenglisu-1199db.netlify.app'
          mkdir -p stb0-results
          curl -L --fail --retry 5 "$base/stb0/results/build.log" -o stb0-results/build.log
          curl -L --fail --retry 5 "$base/" -o stb0-results/index.html
          for file in summary.json report.md model_metrics.csv semantic_clear_boundary_failures.csv; do
            curl -L --fail --retry 5 "$base/stb0/results/$file" -o "stb0-results/$file" || true
          done
          curl -L --fail --retry 5 "$base/STB0_successful_translation_pilot.zip" -o stb0-results/STB0_successful_translation_pilot.zip || true
      - name: Commit fetched artifacts
        run: |
          git config user.name 'STB-0 artifact bridge'
          git config user.email 'stb0@regimereader.local'
          git add stb0-results
          git commit -m 'Refresh executed STB-0 artifacts and diagnostics' || exit 0
          git push
